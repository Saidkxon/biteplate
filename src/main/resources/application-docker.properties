spring.application.name=biteplate-srms-assignment-ready
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/biteplate_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.web.resources.static-locations=classpath:/static/
